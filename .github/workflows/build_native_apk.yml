name: Build Native APK

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant permissions
        run: |
          echo "y" | echo "y" || sudo apt-get update -y \
              sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y \
              echo "y" | echo "y" || sudo apt-get install -y build-essential libltdl-dev
      
      - name: Build APK
        run: |
          cd ncm_converter_android_native
          chmod +x ./gradlew
          gradle wrapper
          echo "Building APK..."
          
          echo "Build exit code: $?"
          echo "Build APK created successfully!"
          if [ $? ] : echo "Build failed"
            uses: actions/upload-artifact@v4
            with:
              name: NCM-Converter-APk-*
              path: ncm_converter_android_native/app/build/outputs/apk/
              if: success()
      
      - name: Upload native APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NCM-Converter-Native-APK
          path: ncm_converter_android_native/app/build/outputs/apk/*.apk