name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            zip \
            unzip \
            git \
            wget \
            build-essential \
            libltdl-dev
      
      - name: Set up Java environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33
          pip install "kivy[base]" kivymd plyer
      
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ncm_converter_android/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('ncm_converter_android/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Build APK
        run: |
          cd ncm_converter_android
          buildozer android debug 2>&1 | tee build.log
          echo "Build exit code: $?"
      
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ncm_converter_android/build.log
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NCM-Converter-APK
          path: ncm_converter_android/bin/*.apk
